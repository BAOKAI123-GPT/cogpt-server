<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 340" width="1600" height="340" role="img" aria-label="Co-GPT 活动公告">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140a2e"/>
      <stop offset="0.5" stop-color="#1a0f3a"/>
      <stop offset="1" stop-color="#0b0814"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.12" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#8b5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.9" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#16a5c9" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#16a5c9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#cdb6ff"/>
      <stop offset="1" stop-color="#7ee0f0"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cff"/>
      <stop offset="1" stop-color="#b06cff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="340" fill="url(#bg)"/>
  <rect width="1600" height="340" fill="url(#g1)"/>
  <rect width="1600" height="340" fill="url(#g2)"/>
  <!-- 装饰星点 -->
  <g fill="#b9a6ff" opacity="0.9">
    <path d="M1180 70 l7 19 19 7 -19 7 -7 19 -7-19 -19-7 19-7z"/>
    <path d="M1330 200 l5 13 13 5 -13 5 -5 13 -5-13 -13-5 13-5z" opacity="0.7"/>
    <circle cx="1090" cy="250" r="4" opacity="0.6"/>
    <circle cx="1420" cy="110" r="5" opacity="0.5"/>
  </g>
  <!-- 标签 -->
  <g transform="translate(90,84)">
    <rect x="0" y="0" rx="16" ry="16" width="118" height="34" fill="#ffffff" opacity="0.10"/>
    <rect x="0" y="0" rx="16" ry="16" width="118" height="34" fill="none" stroke="#b9a6ff" stroke-opacity="0.4"/>
    <text x="59" y="23" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#d9ccff" font-weight="600">活动公告</text>
  </g>
  <!-- 主标题 -->
  <text x="88" y="190" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="62" font-weight="800" fill="url(#txt)">比赛公告即将发布，敬请关注</text>
  <!-- 副标题 -->
  <text x="92" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="#a6a2c2">Co-GPT · 对话即创作的 AI 生图工作台 — 精彩活动陆续上线</text>
  <!-- 行动按钮 -->
  <g transform="translate(92,268)">
    <rect x="0" y="0" rx="22" ry="22" width="180" height="44" fill="url(#pill)"/>
    <text x="90" y="29" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#fff" font-weight="700">了解详情 →</text>
  </g>
  <!-- 右侧品牌字 -->
  <text x="1510" y="300" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#7a7596" opacity="0.8">cogpt.art</text>
</svg>
